# subway_pay.csv · subway_time.csv 매월 자동 갱신 (서울시가 매월 초 전월 데이터 공개)
# 시크릿 필요: SEOUL_KEY (서울열린데이터광장 data.seoul.go.kr 발급 — 혼잡도 수집과 같은 키)
name: update-subway

on:
  schedule:
    - cron: '0 20 4 * *'        # KST 매월 5일 05:00
    - cron: '0 20 8 * *'        # KST 매월 9일 05:00 (공개 지연·실패 대비 재시도, 멱등)
  workflow_dispatch:             # 수동 실행 버튼 (테스트·복구용)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: 지하철 월별 데이터 수집
        env:
          SEOUL_KEY: ${{ secrets.SEOUL_KEY }}
        run: python scripts/update_subway.py

      - name: 변경분 있으면 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/subway_pay.csv data/subway_time.csv
          git diff --cached --quiet || { git commit -m "🤖 지하철 월별 승하차 자동 갱신"; git push; }
