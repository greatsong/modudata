# seoul.csv 매일 자동 갱신 — 마지막 날짜 다음 날부터 '어제'까지 백필
# 시크릿 필요: KMA_KEY (기상청 API허브 apihub.kma.go.kr 발급)
name: update-seoul

on:
  schedule:
    - cron: '0 22 * * *'        # UTC 22:00 = 한국시간 아침 07:00
  workflow_dispatch:             # 수동 실행 버튼 (테스트·복구용)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: 기온 데이터 수집·append
        env:
          KMA_KEY: ${{ secrets.KMA_KEY }}
        run: python scripts/update_seoul_temp.py

      - name: 변경분 있으면 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seoul.csv
          git diff --cached --quiet || { git commit -m "🤖 seoul.csv 기온 자동 갱신"; git push; }
