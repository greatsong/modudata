name: update-population-yearly
# 11장 연도별 인구 시계열(population_yearly.csv.gz) — 매년 7월 그해 6월 데이터 추가 (키 불필요)
on:
  schedule:
    - cron: "0 0 15 7 *"      # 매년 7월 15일 (6월 통계 공개 후)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests pandas
      - name: population_yearly.csv.gz 갱신
        run: python scripts/update_population_yearly.py
      - name: 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/population_yearly.csv.gz
          git commit -m "chore: population_yearly 연도별 갱신 $(TZ=Asia/Seoul date +%Y-%m-%d)" || echo "변화 없음"
          git push
